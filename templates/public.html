<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מסך ציבורי</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/public.js" defer></script>
</head>
<body class="public-page">
  <main class="public-shell">
    <section class="public-stage">
      <div class="public-header">
        <div>
          <p class="eyebrow">קוד משחק <strong id="game-code">----</strong></p>
          <h1 id="question-title">ממתינים לתחילת המשחק</h1>
        </div>
        <div class="public-timer">
          <span id="phase-label">ממתינים</span>
          <strong id="timer-label">--</strong>
        </div>
      </div>

      <div id="question-images" class="question-images hidden"></div>
      <div id="answers-list" class="answers-grid public-answers"></div>
    </section>

    <aside class="public-leaderboard">
      <h2>חמשת המקומות הראשונים</h2>
      <ol id="top-players" class="leaderboard-list"></ol>
    </aside>
  </main>
</body>
</html>
